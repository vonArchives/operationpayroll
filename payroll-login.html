<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payroll System Login — JP Management Consultancy OPC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #3C72FC;
    --primary-hover: #2C5EE0;
    --light-blue: #EBF1FF;
    --text-primary: #000000;
    --text-secondary: #726F84;
    --bg: #FFFFFF;
    --border: #E5E7EB;
    --error: #CF2E2E;
    --focus-glow: rgba(60, 114, 252, 0.15);
    --sidebar-width: 260px;
    --font: 'Jost', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
  }

  body {
    display: flex;
    font-family: var(--font);
    color: var(--text-primary);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Sidebar */
  .sidebar {
    flex: 0 0 var(--sidebar-width);
    background: var(--primary);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px 32px 40px;
    position: relative;
    overflow: hidden;
  }

  .sidebar::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .sidebar-brand {
    position: relative;
    z-index: 1;
  }

  .sidebar-logo {
    max-width: 160px;
    width: 100%;
    height: auto;
    display: block;
    filter: brightness(0) invert(1);
    margin-bottom: 20px;
  }

  .sidebar-name {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    line-height: 1.25;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }

  .sidebar-tagline {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.55);
    line-height: 1.4;
  }

  .sidebar-stat {
    position: relative;
    z-index: 1;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--light-blue);
  }

  /* Right panel */
  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 32px;
    border-left: 1px solid var(--border);
  }

  .login-card {
    width: 100%;
    max-width: 420px;
  }

  .login-card h1 {
    font-size: 22px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.2;
    margin-bottom: 8px;
    color: var(--text-primary);
  }

  .login-card .subhead {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 36px;
  }

  .field {
    margin-bottom: 22px;
  }

  .field-label-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
  }

  .forgot {
    font-size: 12px;
    font-weight: 500;
    color: var(--primary);
    text-decoration: none;
    transition: color 120ms ease;
  }

  .forgot:hover {
    color: var(--primary-hover);
    text-decoration: underline;
  }

  .input-wrap {
    position: relative;
  }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    height: 50px;
    padding: 0 44px 0 14px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 400;
    color: var(--text-primary);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    outline: none;
    transition: border-color 160ms ease, box-shadow 160ms ease;
  }

  input::placeholder {
    color: #b0abb9;
  }

  input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--focus-glow);
  }

  .toggle-eye {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    cursor: pointer;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    padding: 0;
  }

  .toggle-eye svg {
    width: 18px;
    height: 18px;
    display: block;
  }

  .btn {
    width: 100%;
    height: 50px;
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #fff;
    background: var(--primary);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 150ms ease, transform 40ms ease, box-shadow 150ms ease;
  }

  .btn:hover {
    background: var(--primary-hover);
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(60, 114, 252, 0.22);
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 600ms linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .error-msg {
    font-size: 13px;
    font-weight: 500;
    color: var(--error);
    margin-top: 6px;
    line-height: 1.35;
    min-height: 18px;
  }

  .shake {
    animation: shake 420ms ease both;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(7px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(3px); }
  }

  /* Footer */
  .footer {
    margin-top: 40px;
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* Responsive */
  @media (max-width: 820px) {
    body {
      flex-direction: column;
    }
    .sidebar {
      flex: none;
      width: 100%;
      padding: 32px 28px 28px;
      border-left: none;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      flex-direction: row;
      align-items: center;
      gap: 16px;
      justify-content: flex-start;
    }
    .sidebar-logo {
      max-width: 120px;
      margin-bottom: 0;
    }
    .sidebar-brand {
      flex: 1;
    }
    .sidebar-stat {
      display: none;
    }
    .panel {
      border-left: none;
      padding: 36px 24px 48px;
      align-items: flex-start;
      justify-content: flex-start;
    }
    .login-card {
      max-width: 100%;
    }
  }
</style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <img class="sidebar-logo" src="https://jpmcopc.com/wp-content/uploads/2025/03/Group-76.png" alt="JP Management Consultancy OPC" onerror="this.style.display='none'">
      <div class="sidebar-name">JP Management<br>Consultancy OPC</div>
      <div class="sidebar-tagline">We Build Your Edge</div>
    </div>
    <div class="sidebar-stat">Since 2020</div>
  </aside>

  <main class="panel">
    <div class="login-card" id="loginCard">
      <h1>Payroll System Login</h1>
      <p class="subhead">Secure access for authorized personnel only.</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="name@company.com" autocomplete="email" required>
          <p class="error-msg" id="emailError"></p>
        </div>

        <div class="field">
          <div class="field-label-row">
            <label for="password">Password</label>
            <a class="forgot" href="#" onclick="event.preventDefault(); alert('Please contact your system administrator to reset your password.');">Forgot Password?</a>
          </div>
          <div class="input-wrap">
            <input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="toggle-eye" id="toggleEye" aria-label="Show password">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <p class="error-msg" id="passwordError"></p>
        </div>

        <button type="submit" class="btn" id="submitBtn">
          <span id="btnText">Sign In</span>
        </button>
      </form>

      <div class="footer">
        <p>© 2025 JP Management Consultancy OPC. All rights reserved.</p>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const loginCard = document.getElementById('loginCard');
    const toggleEye = document.getElementById('toggleEye');
    const eyeIcon = document.getElementById('eyeIcon');

    const eyeOpen = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
    const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>`;

    let showing = false;
    toggleEye.addEventListener('click', () => {
      showing = !showing;
      passwordInput.type = showing ? 'text' : 'password';
      eyeIcon.innerHTML = showing ? eyeClosed : eyeOpen;
      toggleEye.setAttribute('aria-label', showing ? 'Hide password' : 'Show password');
    });

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function setError(el, msg) {
      el.textContent = msg;
    }

    function clearErrors() {
      emailError.textContent = '';
      passwordError.textContent = '';
      emailInput.style.borderColor = '';
      passwordInput.style.borderColor = '';
    }

    function triggerShake() {
      loginCard.classList.remove('shake');
      void loginCard.offsetWidth; // reflow
      loginCard.classList.add('shake');
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      clearErrors();
      let valid = true;

      const emailVal = emailInput.value.trim();
      if (!emailVal) {
        setError(emailError, 'Email address is required');
        emailInput.style.borderColor = 'var(--error)';
        valid = false;
      } else if (!validateEmail(emailVal)) {
        setError(emailError, 'Please enter a valid email address');
        emailInput.style.borderColor = 'var(--error)';
        valid = false;
      }

      if (!passwordInput.value) {
        setError(passwordError, 'Password is required');
        passwordInput.style.borderColor = 'var(--error)';
        valid = false;
      }

      if (!valid) {
        triggerShake();
        return;
      }

      submitBtn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>Signing in…';

      setTimeout(() => {
        submitBtn.disabled = false;
        btnText.textContent = 'Sign In';
        alert('This is a design prototype. Integrate your backend auth flow to proceed.');
      }, 1800);
    });

    emailInput.addEventListener('input', () => {
      if (emailError.textContent) {
        emailError.textContent = '';
        emailInput.style.borderColor = '';
      }
    });

    passwordInput.addEventListener('input', () => {
      if (passwordError.textContent) {
        passwordError.textContent = '';
        passwordInput.style.borderColor = '';
      }
    });
  </script>
</body>
</html>
